# Cross-platform build + model-free test matrix (v0.9.0 D7). The proxy gate
# for macOS/Linux where no hardware is on hand: it proves the app compiles and
# packages and the model-free suites pass everywhere. It does NOT exercise the
# audio loop (mic capture, PTT, backend spawn) — that stays a hands-on gate.
name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Model-free test suites
        run: npm test

      - name: Build renderer
        run: npx vite build

      - name: Package app (unpacked, current platform)
        # --dir skips installers (no signing/notarization in CI); proves the
        # electron-builder config resolves and the app tree assembles.
        run: npx electron-builder --dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
